name: Sync from BuiltByEcho source

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    if: github.repository == 'Wdustin1/echo-site'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main from BuiltByEcho/echo-site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/BuiltByEcho/echo-site.git
          git fetch upstream main
          git checkout main
          git reset --hard upstream/main
          git push origin main --force-with-lease
